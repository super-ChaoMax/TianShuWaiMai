#application-dev.yml
sky:
  # 数据库配置（windows）
  datasource:
    #MySQL 驱动类
    driver-class-name: com.mysql.cj.jdbc.Driver
    host: localhost
    port: 3306
    database: tianshuwaimai
    username: root
    password: 123456



  #  spring data rdis 的配置
  redis:
    host: 192.168.1.100
    port: 6379
    password: 123456
    database: 1



# Mybatis配置
mybatis:
  configuration:
    # SQL语句打印到控制台，生产环境请关闭
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 配置SQL语句的格式化
    map-underscore-to-camel-case: true

# 阿里云配置
aliyun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    access-key-id: ${ALIBABA_CLOUD_ACCESS_KEY_ID}
    access-key-secret: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
    bucket-name: tianshuwaimai

# JWT配置
jwt:
  secret: "jwt_secret_key_zzc666888abcdefghijklmnopqrst"
  expire: 86400



