<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付确认</title>
    <!-- 【修改1】屏蔽浏览器默认图标请求，彻底消除 favicon.ico 403 报错 -->
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {padding: 40px 20px; text-align: center; font-size: 18px;}
        .box {margin-top: 50px;}
        button {
            padding: 14px 40px;
            background: #07c160;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            min-width: 160px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:disabled{
            background: #94e0b7;
            cursor: not-allowed;
        }
        .price{
            color:#f53f3f;
            font-size:22px;
            margin:15px 0;
        }
        .success-icon{
            font-size:60px;
            color:#07c160;
            margin:20px 0;
        }
        .success-text{
            font-size:24px;
            color:#333;
            margin-bottom:15px;
        }
        .empty-tip{
            color:#666;
            margin-top: 60px;
            font-size: 16px;
        }
    </style>
</head>
<body>
<div class="box" id="payBox">
    <p>订单支付</p>
    <p style="margin:20px 0" id="orderText"></p>
    <p class="price" id="amountText"></p>
    <button id="payBtn">点击确认支付</button>
    <p style="margin-top:30px;color:#999" id="tipText">操作完成后返回原页面查看结果</p>
</div>

<script>
    let ws = null;
    let wsOrderId = '';
    let orderId = '';
    let payAmount = '';
    let heartTimer = null;
    let payLock = false;

    // 生成浏览器唯一标识
    function getBrowserCid() {
        let cid = localStorage.getItem("payWsCid");
        if (!cid) {
            cid = crypto.randomUUID();
            localStorage.setItem("payWsCid", cid);
        }
        return cid;
    }

    // 获取URL地址栏参数
    function getUrlParam(name) {
        return new URLSearchParams(location.search).get(name) || '';
    }

    // 金额格式化 保留两位小数
    function formatMoney(num) {
        return parseFloat(Number(num) || 0).toFixed(2)
    }

    // 带超时拦截的请求封装
    function fetchWithTimeout(url, options = {}, timeout = 8000) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeout);
        return fetch(url, { ...options, signal: controller.signal })
            .finally(() => clearTimeout(timer));
    }

    // 开启心跳上报
    function startHeartBeat() {
        if(heartTimer) return;
        heartTimer = setInterval(() => {
            if (!orderId || payLock) {
                stopHeartBeat()
                return
            }
            fetchWithTimeout(`/wx/pay/heart?orderId=${orderId}`)
                .catch(err => console.log("心跳上报异常", err))
        }, 2000)
    }

    // 关闭心跳定时器
    function stopHeartBeat() {
        if(heartTimer){
            clearInterval(heartTimer)
            heartTimer = null;
        }
    }

function initWebSocket(){
    // 直接写你电脑局域网IP + 8080 明文ws，彻底避开wss报错
    let wsUrl = `ws://192.168.198.1:8080/ws/aw/pay?session=${getBrowserCid()}`;

    ws = new WebSocket(wsUrl);

    ws.onopen = function () {
        console.log("支付WebSocket连接成功");
    };

    ws.onmessage = function (res) {
        const data = JSON.parse(res.data);
        console.log("收到后端消息", data);
        if(data.type === 1){
            wsOrderId = data.orderNo;
        }
    };

    ws.onclose = function () {
        console.log("支付WS连接已关闭");
    };

    ws.onerror = function () {
        console.log("支付WS连接出错");
    };
}





    const userId = getUrlParam('userId');

    // 页面加载完成执行逻辑
    window.onload = async function(){
        // 【修改4】执行顺序优先初始化WS，再加载订单，流程不乱序
        initWebSocket();

        if(!userId) {
            document.getElementById('payBox').innerHTML = '<p class="empty-tip">缺少用户参数，无法发起支付</p>';
            return;
        }
        try{
            //加一个定时器（异步没用的）
            // 同步休眠等待2秒，会阻塞后续代码执行
            console.log("开始等待2秒...");
            await new Promise(resolve => setTimeout(resolve, 2000));
            console.log("等待2秒等待订单加载完成");
            console.log("订单加载完成"+wsOrderId);

            let json;
            if(wsOrderId!==''){
                console.log("历史订单");
                let res2 = await fetchWithTimeout(`/wx/pay/queryOrder?id=${wsOrderId}`)
                if(!res2.ok) throw new Error("订单查询失败")
                json = await res2.json();
                if(json.code !== 200 || !json.data){
                    document.getElementById('payBox').innerHTML = '<p class="empty-tip">暂无待支付订单</p>';
                    return
                }
            }else{
                console.log("直接订单支付");
                let res1 = await fetchWithTimeout(`/wx/pay/query?userId=${userId}`)
                if(!res1.ok) throw new Error("订单查询失败")
                json = await res1.json();
                if(json.code !== 200 || !json.data){
                    document.getElementById('payBox').innerHTML = '<p class="empty-tip">暂无待支付订单</p>';
                    return
                }
            }

            let order = json.data;
            orderId = order.id;
            payAmount = order.amount;

            document.getElementById('orderText').innerText = `订单号：${orderId}`;
            document.getElementById('amountText').innerText = `应付金额：¥${formatMoney(payAmount)}`;

            await fetchWithTimeout(`/wx/pay/notify?orderId=${orderId}`);
            startHeartBeat();
        }catch(e){
            console.error(e)
            document.getElementById('payBox').innerHTML = '<p class="empty-tip">订单加载失败，请重试</p>';
        }
    }

    // 支付按钮点击事件
    document.getElementById('payBtn').onclick = async function(){
        console.log("点击支付按钮");
        // 【修改5】增加订单为空弹窗提示，静默无反应问题解决
        if(payLock || !orderId) {
            alert("暂无有效订单，无法支付");
            return;
        }
        payLock = true;
        this.disabled = true;
        this.innerText = "处理中...";

        let params = {
            orderNo: orderId,
            amount: payAmount,
            payChannel: "MOCK",
            userId: userId
        };

        try {
            let res = await fetchWithTimeout("/wx/pay/create", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(params)
            })
            if(!res.ok) throw new Error("请求异常")
            let data = await res.json();

            if(data.payStatus === "SUCCESS" || data.payStatus === "CREATE"){
                if(ws) ws.close();
                stopHeartBeat();
                const box = document.getElementById('payBox');
                box.innerHTML = `
                    <div class="success-icon">✓</div>
                    <p class="success-text">支付成功</p>
                    <p>订单号：${orderId}</p>
                    <p style="color:#666;margin-top:10px">请返回小程序查看订单状态</p>
                `;
                return;
            }else{
                alert("支付失败，请重新尝试");
            }
        } catch (e) {
            if(e.name === 'AbortError'){
                alert("请求超时，请检查网络后重试");
            }else{
                alert("支付请求异常");
            }
        }

        // 支付失败重置按钮状态
        payLock = false;
        this.disabled = false;
        this.innerText = "点击确认支付";
    }

    // 页面关闭/刷新 优雅关闭订单
    window.addEventListener('beforeunload', function(){
        stopHeartBeat();
        if(orderId){
            navigator.sendBeacon(`/wx/pay/close?orderId=${orderId}`);
        }
    })
</script>
</body>
</html>
